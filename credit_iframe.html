	<script type="text/javascript">
	$(document).ready(function () {		
		$("#myform").submit(function(event){
			
			/* stop form from submitting normally othervise will forward after submit*/
            event.preventDefault();
			
            var $form = $(this),
            formurl = $form.attr('action');
            $.ajax(
	        		{
	                	headers: { 'x-csrf-token': 'aWxhbkBpc3lzLmNvLmlsIykoK19uYWxpIyktK180'},
	                    type: 'POST',
	                    url: formurl,
	                    contentType: 'application/json; charset=utf-8',
	                    dataType: 'json',
	                    data: JSON.stringify({ 'amount': $("#inputAmount").val(),'email':$("#inputEmail").val() }),    
	                    success: function(response)
	                    {
	                    	//console.log(response);
	                    	$('#myform input[type="text"]').val('');
	                    	$('#myform input[type="email"]').val('');
	                        alert(response);

	                    },
	                    error: function(response)
	                    {
	                    	//console.log(response);
	                    	alert(response.responseJSON);
	                    }
	                });

		}); 
		});
	
	</script>

<div class="wrapper iframe_donation-wrap">

<div class="container">
    <div class="col-sm-6">
    <form id='myform' action='https://toassociate.com/toassociate2_v2_0/invoices/createReceipt/iframe'>
        <fieldset>
        	<legend>הדגמת קמפיין לגיוס תרומות</legend>
        	<legend>צרו קשר ונעזור לכם בגיוס תרומות לעמותה</legend>
            <legend>סליקת אשראי ורישום קבלה בעמותות אונליין</legend>
            <div class="control-group">
                <label class="control-label">שם מלא של בעל הכרטיס</label>
                <div class="row">
                        <div class="col-md-6">
                        <input type="text" class="form-control" id="inputFirstName" placeholder="שם פרט" title="שם פרט" required>
                        </div>
                        <div class="col-md-6">
                        <input type="text" class="form-control" id="inputLastName" placeholder="שם משפחה" title="שם משפחה" required>
                        </div>
                </div>
                <div class="row">
                        <div class="col-md-6">
                        <label for="inputEmail" class="control-label">דוא"ל</label>
					    <input type="email" class="form-control" id="inputEmail" placeholder="מייל אישי של התורם" data-error="כתובת אינה תקינה" required>
					    <div class="help-block with-errors"></div>
                        </div>
                        <div class="col-md-6">
                        <label class="control-label">מספר תעודת זהות</label>
		                <div class="controls">
		                    <input type="text" class="form-control" id="inputTeudatZehut" placeholder="מספר תעודת זהות של בעל הכרטיס" pattern="\d{9}" title="מספר תעודת זהות של בעל הכרטיס" required>
		                </div>
                        </div>
                </div>
                
                <div class="row">
                        <div class="col-md-6">
                        	<label class="control-label">מספר כרטיס אשראי</label>
					    	<input type="text" class="form-control" id="inputCardNumber" placeholder="מספר כרטיס אשראי" data-minlength="8" pattern="^[_0-9]{1,}$" maxlength="16" title="מספר כרטיס אשראי" required>
                        </div>
                        <div class="col-md-6">
                        <label class="control-label">סכום בש"ח</label>
		                <div class="controls">
		                    <input type="text" class="form-control" id="inputAmount" placeholder="סכום כספי לסליקה" pattern="^[_0-9]{1,}$" title="סכום כספי לסליקה" required>
		                </div>
                        </div>
                </div>
			</div>
            <div class="control-group">
                
                <div class="controls">
                    <div class="row">
                        <div class="col-md-6">
                        <label class="control-label">תוקף הכרטיס</label>
                            <select class="form-control">
                                <option value="01">1 - ינואר</option>
                                <option value="02">2 - פברואר</option>
                                <option value="03">3 - מרץ</option>
                                <option value="04">4 - אפריל</option>
                                <option value="05">5 - מאי</option>
                                <option value="06">6 - יוני</option>
                                <option value="07">7 - יולי</option>
                                <option value="08">8 - אוגוסט</option>
                                <option value="09">9 - ספטבמר</option>
                                <option value="10">10- אוקטובר</option>
                                <option value="11">11- נובמבר</option>
                                <option value="12">12- דצמבר</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                        <label class="control-label">שנה</label>
                            <select class="form-control">
                                <option>2017</option>
                                <option>2018</option>
                                <option>2019</option>
                                <option>2020</option>
                                <option>2021</option>
                                <option>2022</option>
                                <option>2023</option>
                                <option>2024</option>
                                <option>2025</option>
                                <option>2026</option>
                                <option>2027</option>
                                <option>2028</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                        <label class="control-label">CVV</label>
                            <input type="text" class="form-control" id="inputCVV" placeholder="על גב הכטיס" autocomplete="off" maxlength="3" pattern="\d{3}" title="שלוש ספרות על גב הכרטיס" required>
                        </div>
                    </div>
                </div>
            </div>
           
            <div class="control-group">
              <label class="control-label"></label>
              <div class="controls">
                <button type="submit" id="submit-button" class="btn btn-primary">שלח לסליקה</button> 
              </div>
            </div>
        </fieldset>
        </form>
    </div>
